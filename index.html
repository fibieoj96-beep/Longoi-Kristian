<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Longoi Kristian</title>
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
</head>
<body>

<header class="textured-header" id="main-header">
    <div class="header-slot-left">
        <button id="back-button" class="back-pill" onclick="showListView()" style="display: none;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            <span>BACK</span>
        </button>
    </div>

    <h1 id="header-title">Longoi</h1>

    <div class="header-slot-right">
        <div onclick="toggleDarkMode()" class="icon-toggle" id="dark-toggle">
            <svg class="sun-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg class="moon-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </div>
    </div>
</header>

<main id="main-content">
    <div class="search-wrapper">
        <div class="search-box" id="search-container" onclick="expandSearch()">
            <input type="text" id="search-input" placeholder="Search..." onkeyup="handleSearch()" onblur="shrinkSearch()">
            <div class="search-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
        </div>
    </div>
    <div id="app-list">
        <p style="text-align: center; padding: 40px; color: var(--text-dim);">Loading...</p>
    </div>
</main>

<nav class="tabbar" id="tabbar">
    <button class="nav-item active" onclick="changeCategory('hymns', this)">
        <img src="asset/icon/longoi-active.png" class="icon-active">
        <img src="asset/icon/longoi-dim.png" class="icon-dim">
        <span class="nav-label">Longoi</span>
    </button>
    <button class="nav-item" onclick="changeCategory('psalms', this)">
        <img src="asset/icon/zabur-active.png" class="icon-active">
        <img src="asset/icon/zabur-dim.png" class="icon-dim">
        <span class="nav-label">Zabur</span>
    </button>
    <button class="nav-item" onclick="changeCategory('prayers', this)">
        <img src="asset/icon/doa-active.png" class="icon-active">
        <img src="asset/icon/doa-dim.png" class="icon-dim">
        <span class="nav-label">Doa</span>
    </button>
    <button class="nav-item" onclick="changeCategory('liturgies', this)">
        <img src="asset/icon/hoturan-active.png" class="icon-active">
        <img src="asset/icon/hoturan-dim.png" class="icon-dim">
        <span class="nav-label">Hoturan</span>
    </button>
    <button class="nav-item" onclick="changeCategory('others', this)">
        <img src="asset/icon/more-active.png" class="icon-active">
        <img src="asset/icon/more-dim.png" class="icon-dim">
        <span class="nav-label">Vokon</span>
    </button>
</nav>

<script>
    let allItems = [];
    let currentType = 'hymns';

    function toggleDarkMode() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

    async function loadData() {
        const categories = ["hymns", "psalms", "prayers", "liturgies", "others"];
        const fetchPromises = categories.map(async (cat) => {
            try {
                const res = await fetch(`data/${cat}.json`);
                if (!res.ok) return [];
                const data = await res.json();
                return data.map((item, index) => ({ ...item, type: cat, id: item.id || index + 1 }));
            } catch(e) { return []; }
        });
        const results = await Promise.all(fetchPromises);
        allItems = results.flat();
        renderList('hymns');
    }

    function renderList(type, filteredItems = null) {
        const items = filteredItems || allItems.filter(i => i.type === type);
        const listContainer = document.getElementById("app-list");
        if (items.length === 0) {
            listContainer.innerHTML = '<p style="text-align:center; padding:40px; color:var(--text-dim);">No items found.</p>';
            return;
        }
        listContainer.innerHTML = items.map((item, index) => {
            const displayId = item.id || (index + 1);
            return `<div class="card" onclick="openDetail('${item.id}', '${item.type}')">
                        <div class="title"><span style="color: var(--text-dim); font-weight: 800; margin-right: 10px;">${displayId}.</span>${item.title}</div>
                    </div>`;
        }).join("");
    }

    function handleSearch() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const filtered = allItems.filter(i => i.type === currentType && i.title.toLowerCase().includes(query));
        renderList(currentType, filtered);
    }

    function expandSearch() {
        const container = document.getElementById('search-container');
        const input = document.getElementById('search-input');
        if (container && !container.classList.contains('expanded')) {
            container.classList.add('expanded');
            setTimeout(() => input.focus(), 150);
        }
    }

    function shrinkSearch() {
        const container = document.getElementById('search-container');
        const input = document.getElementById('search-input');
        if (input && input.value === "" && container) {
            container.classList.remove('expanded');
        }
    }

    function changeCategory(type, el) {
        currentType = type;
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        if (el) el.classList.add('active');
        const titles = { 'hymns': 'Longoi', 'psalms': 'Zabur', 'prayers': 'Doa', 'liturgies': 'Hoturan', 'others': 'Vokon' };
        document.getElementById('header-title').innerText = titles[type] || "More";
        showListView();
    }

    function openDetail(id, type) {
    const item = allItems.find(i => String(i.id) === String(id) && i.type === type);
    if (!item) return;

    // --- AUTO-SHRINK SEARCH ON CLICK ---
    const searchContainer = document.getElementById('search-container');
    const searchInput = document.getElementById('search-input');
    if (searchContainer && searchContainer.classList.contains('expanded')) {
        searchContainer.classList.remove('expanded');
        searchInput.blur();
        searchInput.value = ""; // Clear search so the list resets when you come back
    }

    const header = document.getElementById('main-header');
    header.classList.add('is-song'); 
    
    document.getElementById('back-button').style.display = 'flex';
    document.querySelector('.search-wrapper').style.display = 'none';
    document.getElementById('tabbar').classList.add('hidden');

    let displayContent = "";
    if (item.content_json && item.content_json.section) {
        displayContent = item.content_json.section.map(sec => {
            return sec.content ? sec.content.map(c => `
                <div style="margin-bottom: 20px;">
                    <h3 style="color: var(--primary); font-size: 1.1rem; margin-bottom: 5px; font-weight: bold;">${c.header}</h3>
                    <div class="verse-text">${c.paragraph || ""}</div>
                </div>`).join("") : "";
        }).join("");
    } else {
        const clean = (str) => str ? str.split('\\n').join('<br>') : "";
        displayContent = `<div class="verse-text">${clean(item.lyric || item.content)}</div>`;
    }

    document.getElementById("app-list").innerHTML = `
        <div class="lyrics-view">
            <h2 style="text-align:center; margin-bottom:20px;">${item.title}</h2>
            ${displayContent}
        </div>`;
    window.scrollTo(0,0);
}

    function showListView() {
        const header = document.getElementById('main-header');
        header.classList.remove('is-song'); 
        
        document.getElementById('back-button').style.display = 'none';
        document.querySelector('.search-wrapper').style.display = 'flex';
        document.getElementById('tabbar').classList.remove('hidden');
        renderList(currentType);
    }

document.addEventListener('click', function(event) {
    const container = document.getElementById('search-container');
    const input = document.getElementById('search-input');

    if (container && !container.contains(event.target) && container.classList.contains('expanded')) {
        container.classList.remove('expanded');
    
        input.value = ""; 
        renderList(currentType);
        
        input.blur();
    }
});


loadData();
</script>
</body>
</html>
