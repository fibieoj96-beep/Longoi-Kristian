<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Longoi Kristian</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Longoi">
    <link rel="apple-touch-icon" href="asset/icon/icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="textured-header" id="main-header">
    <div class="header-slot-left">
        <button id="back-button" class="back-pill" onclick="showListView()" style="display: none;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            <span>BACK</span>
        </button>
    </div>
    <h1 id="header-title">Longoi</h1>
    <div class="header-slot-right">
        <div onclick="toggleDarkMode()" class="icon-toggle" id="dark-toggle">
            <svg class="sun-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg class="moon-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </div>
    </div>
</header>

<main id="main-content">
    <div class="search-wrapper">
        <div class="search-box" id="search-container" onclick="expandSearch()">
            <input type="text" id="search-input" placeholder="Search..." onkeyup="handleSearch()" onblur="shrinkSearch()">
            <div class="search-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
        </div>
    </div>
    <div id="app-list">
        <p style="text-align: center; padding: 40px; color: var(--text-dim);">Loading...</p>
    </div>
</main>

<nav class="tabbar" id="tabbar">
    <button class="nav-item active" onclick="changeCategory('hymns', this)">
        <img src="asset/icon/longoi-active.png" class="icon-active">
        <img src="asset/icon/longoi-dim.png" class="icon-dim">
        <span class="nav-label">Longoi</span>
    </button>
    <button class="nav-item" onclick="changeCategory('psalms', this)">
        <img src="asset/icon/zabur-active.png" class="icon-active">
        <img src="asset/icon/zabur-dim.png" class="icon-dim">
        <span class="nav-label">Zabur</span>
    </button>
    <button class="nav-item" onclick="changeCategory('bible', this)">
        <img src="asset/icon/alkitab-active.png" class="icon-active">
        <img src="asset/icon/alkitab-dim.png" class="icon-dim">
        <span class="nav-label">Alkitab</span>
    </button>
    <button class="nav-item" onclick="changeCategory('prayers', this)">
        <img src="asset/icon/doa-active.png" class="icon-active">
        <img src="asset/icon/doa-dim.png" class="icon-dim">
        <span class="nav-label">Doa</span>
    </button>
    <button class="nav-item" onclick="changeCategory('liturgies', this)">
        <img src="asset/icon/hoturan-active.png" class="icon-active">
        <img src="asset/icon/hoturan-dim.png" class="icon-dim">
        <span class="nav-label">Hoturan</span>
    </button>
    <button class="nav-item" onclick="changeCategory('others', this)">
        <img src="asset/icon/more-active.png" class="icon-active">
        <img src="asset/icon/more-dim.png" class="icon-dim">
        <span class="nav-label">Vokon</span>
    </button>
</nav>

<div class="tabbar-watermark">© 2026 Hak Cipta Terpelihara. Fibieo.J96</div>

<script>
let allItems = [];
let currentType = 'hymns';
let currentBibleBook = null;
let viewState = 'list';

function toggleDarkMode() {
    const isDark = document.body.classList.toggle('dark-mode');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

async function loadData() {
    const categories = ["hymns", "bible", "psalms", "prayers", "liturgies", "others"];
    const fetchPromises = categories.map(async (cat) => {
        try {
            const res = await fetch(`data/${cat}.json?v=${new Date().getTime()}`);
            if (!res.ok) return [];
            const data = await res.json();
            return data.map((item, index) => {
                const finalTitle = item.title || item.name || item.judul || "No Title";
                const finalContent = item.content || item.text || item.lyric || "";
                return { 
                    ...item, 
                    type: cat, 
                    id: item.id || (index + 1),
                    title: finalTitle,
                    content: finalContent
                };
            });
        } catch(e) { return []; }
    });
    const results = await Promise.all(fetchPromises);
    allItems = results.flat();
    renderList(currentType);
}

function updateHeaderUI(isCenter) {
    const titleHeader = document.getElementById('header-title');
    const darkToggle = document.getElementById('dark-toggle');
    const header = document.getElementById('main-header');
    const backBtn = document.getElementById('back-button');
    
    if (header) {
        header.style.display = 'flex';
        header.style.flexDirection = 'row';
        header.style.alignItems = 'center';
        header.style.justifyContent = 'space-between';
        header.style.position = 'relative';
        header.style.paddingTop = 'calc(env(safe-area-inset-top) + 10px)';
        header.style.minHeight = isCenter ? '90px' : '70px';
        header.style.paddingBottom = isCenter ? '15px' : '10px';
        header.style.paddingLeft = '20px';
        header.style.paddingRight = '20px';
    }

    if (titleHeader) {
        titleHeader.style.fontWeight = '900';
        titleHeader.style.textTransform = 'uppercase';
        titleHeader.style.fontSize = '2.2rem';
        titleHeader.style.margin = '0';
        
        if (isCenter) {
            titleHeader.style.position = 'absolute';
            titleHeader.style.left = '50%';
            titleHeader.style.top = 'calc(env(safe-area-inset-top) + 18px)';
            titleHeader.style.transform = 'translateX(-50%)';
        } else {
            titleHeader.style.position = 'static';
            titleHeader.style.transform = 'none';
        }
    }
    
    if (darkToggle) {
        if (isCenter) {
            darkToggle.style.setProperty('display', 'none', 'important');
        } else {
            darkToggle.style.setProperty('display', 'flex', 'important');
            darkToggle.style.position = 'static'; 
            // Memberi ruang 10px supaya tidak terlalu ke kanan
            darkToggle.style.marginRight = '10px'; 
            darkToggle.style.transform = 'none';
        }
    }

    if (backBtn) {
        if (isCenter) {
            backBtn.style.display = 'flex';
            backBtn.style.position = 'static';
            backBtn.style.transform = 'scale(0.85)';
            backBtn.style.transformOrigin = 'left center';
            backBtn.style.marginTop = '8px';
        } else {
            backBtn.style.display = 'none';
        }
    }
}

function renderList(type, filteredItems = null, bibleContent = null) {
    const listContainer = document.getElementById("app-list");
    updateHeaderUI(false);
    if (bibleContent) {
        listContainer.innerHTML = bibleContent;
        return;
    }
    const items = filteredItems || allItems.filter(i => i.type === type);
    if (items.length === 0) {
        listContainer.innerHTML = '';
        return;
    }
    listContainer.innerHTML = items.map((item) => {
        const displayTitle = item.title || item.name || "No Title";
        return `<div class="card" onclick="openDetail('${item.id}', '${item.type}')"><div class="title">${displayTitle}</div></div>`;
    }).join("");
}

async function handleSearch() {
    const query = document.getElementById('search-input').value.toLowerCase().trim();
    const titleHeader = document.getElementById('header-title');
    const titles = { 'hymns': 'Longoi','bible': 'Alkitab', 'psalms': 'Zabur', 'prayers': 'Doa', 'liturgies': 'Hoturan', 'others': 'Vokon' };

    if (query === "") {
        titleHeader.innerText = titles[currentType] || "More";
        renderList(currentType);
        return;
    }

    if (currentType === 'bible') {
        const bibleMatch = query.match(/^(\d?\s*[a-z]+)?\s*(\d+)(?::(\d+))?$/);
        if (bibleMatch) {
            const bookSearch = (bibleMatch[1] || "").trim();
            const chapterNum = parseInt(bibleMatch[2]);
            const verseNum = bibleMatch[3];
            const bibleBooks = allItems.filter(i => i.type === 'bible' && i.title.toLowerCase().includes(bookSearch));

            if (bibleBooks.length > 0) {
                const bookId = bibleBooks[0].id;
                if (verseNum) {
                    renderBibleSpecific(bookId, chapterNum - 1, verseNum);
                    return;
                } else {
                    try {
                        const res = await fetch(`data/bible/${bookId}.json`);
                        const data = await res.json();
                        const ch = data[chapterNum - 1];
                        if (ch) {
                            let html = `<div style="padding:10px 5px;">`;
                            ch.content.forEach(v => {
                                html += `<div style="margin-bottom:15px; line-height:1.6; font-size:1.2rem; color:var(--text-main);"><span style="font-weight:900; opacity:0.6; font-size:0.9rem; margin-right:8px;">${v.verse}</span><span>${v.text}</span></div>`;
                            });
                            html += `</div>`;
                            titleHeader.innerText = "Results";
                            renderList(null, null, html);
                            return;
                        }
                    } catch (e) {}
                }
            }
        }
    }

    const filtered = allItems.filter(item => {
        if (item.type !== currentType) return false;
        const inTitle = item.title.toLowerCase().includes(query);
        const inContent = item.content && item.content.toLowerCase().includes(query);
        return inTitle || inContent;
    });

    titleHeader.innerText = "Results";
    renderList(null, filtered);
}

function changeCategory(type, el) {
    currentType = type;
    viewState = 'list';
    const input = document.getElementById('search-input');
    if (input) input.value = ""; 
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    if (el) el.classList.add('active');
    const titles = { 'hymns': 'Longoi','bible': 'Alkitab', 'psalms': 'Zabur', 'prayers': 'Doa', 'liturgies': 'Hoturan', 'others': 'Vokon' };
    document.getElementById('header-title').innerText = titles[type] || "More";
    showListView();
}

function openDetail(id, type) {
    if (type === 'bible') { openBibleChapters(id); return; }
    viewState = 'detail';
    const item = allItems.find(i => String(i.id) === String(id) && i.type === type);
    if (!item) return;

    const titleHeader = document.getElementById('header-title');
    const titles = { 'hymns': 'Longoi','bible': 'Alkitab', 'psalms': 'Zabur', 'prayers': 'Doa', 'liturgies': 'Hoturan', 'others': 'Vokon' };
    if (titleHeader) titleHeader.innerText = titles[item.type] || "More";
    updateHeaderUI(true);

    document.querySelector('.search-wrapper').style.display = 'none';
    document.getElementById('tabbar').classList.add('hidden');
    
    const processText = (text) => text ? text.split('\\\\n').join('<br>').split('\\n').join('<br>').split('\n').join('<br>') : "";
    let mainBody = `<div class="clean-render-left">${processText(item.content_html || item.content || item.text || item.lyric || "")}</div>`;
    
    document.getElementById("app-list").innerHTML = `<div class="lyrics-view" style="padding: 25px 20px;"><h2 style="text-align:center !important; margin-bottom:45px; font-weight:900; font-size:1.8rem;">${item.title}</h2><div class="verse-text">${mainBody}</div><div style="height:150px;"></div></div>`;
    window.scrollTo(0,0);
}

async function openBibleChapters(bookId) {
    currentBibleBook = bookId;
    viewState = 'chapters';
    const titleHeader = document.getElementById('header-title');
    if (titleHeader) titleHeader.innerText = "Alkitab";
    updateHeaderUI(true);
    document.querySelector('.search-wrapper').style.display = 'flex';
    document.getElementById('tabbar').classList.remove('hidden');
    try {
        const res = await fetch(`data/bible/${bookId}.json`);
        const chapters = await res.json();
        let html = `<div class="bible-view" style="padding:20px;"><h2 style="text-align:center; margin-bottom:30px; color: var(--text-main); font-weight: 900; text-transform: uppercase;">${bookId}</h2><div class="chapter-grid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;">`;
        chapters.forEach((ch, index) => {
            const cleanNum = String(ch.chapter).replace(/Bab/gi, "").trim();
            html += `<div class="chapter-card" onclick="renderBibleVerses('${bookId}', ${index})" style="background:var(--surface); padding:15px; text-align:center; border-radius:12px; border: 1px solid var(--border); cursor: pointer;"><div style="font-size: 1.2rem; font-weight: 900; color: var(--text-main);">${cleanNum}</div></div>`;
        });
        html += `</div></div>`;
        document.getElementById("app-list").innerHTML = html;
        window.scrollTo(0,0);
    } catch(e) { document.getElementById("app-list").innerHTML = ''; }
}

async function renderBibleVerses(bookId, chapterIndex) {
    viewState = 'verses';
    currentBibleBook = bookId;
    const titleHeader = document.getElementById('header-title');
    if (titleHeader) titleHeader.innerText = "Alkitab";
    updateHeaderUI(true);
    document.querySelector('.search-wrapper').style.display = 'none';
    document.getElementById('tabbar').classList.add('hidden');
    try {
        const res = await fetch(`data/bible/${bookId}.json`);
        const data = await res.json();
        const ch = data[chapterIndex];
        const cleanChapterNumber = String(ch.chapter).replace(/Bab/gi, "").trim();
        let html = `<div class="bible-reader-view" style="padding: 20px 15px; text-align: left;"><h2 style="text-align:center; color: var(--text-main); margin-bottom: 5px; font-weight: 900;">${bookId}</h2><div style="text-align:center; color: #8e8e93; margin-bottom: 30px; font-weight: 600;">Bab ${cleanChapterNumber}</div><div class="verses-container">${ch.content.map(v => `${v.header ? `<div style="color: var(--text-main); font-size: 1.25rem; font-weight: 900; margin: 35px 0 12px 0; line-height: 1.4;">${v.header}</div>` : ''}<div style="margin-bottom: 22px;"><div style="color: var(--text-main); font-weight: 900; font-size: 1rem; margin-bottom: 4px; opacity: 0.7;">${v.verse}.</div><div style="line-height: 1.8; font-size: 1.35rem; color: var(--text-main);">${v.text}</div></div>`).join("")}</div><div style="height: 150px;"></div></div>`;
        document.getElementById("app-list").innerHTML = html;
        window.scrollTo(0,0);
    } catch (e) { document.getElementById("app-list").innerHTML = ''; }
}

async function renderBibleSpecific(bookId, chapterIndex, verseNumber) {
    viewState = 'verses';
    currentBibleBook = bookId;
    const titleHeader = document.getElementById('header-title');
    if (titleHeader) titleHeader.innerText = "Alkitab";
    updateHeaderUI(true);
    try {
        const res = await fetch(`data/bible/${bookId}.json`);
        const data = await res.json();
        const ch = data[chapterIndex];
        if (!ch) return;
        const cleanChapterNumber = String(ch.chapter).replace(/Bab/gi, "").trim();
        let html = `<div class="bible-reader-view" style="padding: 20px 15px; text-align: left;"><h2 style="text-align:center; color: var(--text-main); margin-bottom: 5px; font-weight: 900;">${bookId}</h2><div style="text-align:center; color: #8e8e93; margin-bottom: 30px; font-weight: 600;">Bab ${cleanChapterNumber}</div><div class="verses-container">`;
        ch.content.forEach(v => {
            const isTarget = String(v.verse) === String(verseNumber);
            const highlight = isTarget ? "background: var(--primary); color: white; padding: 2px 5px; border-radius: 4px;" : "";
            if (v.header) html += `<div style="color: var(--text-main); font-size: 1.25rem; font-weight: 900; margin: 35px 0 12px 0; line-height: 1.4;">${v.header}</div>`;
            html += `<div id="v-${v.verse}" style="margin-bottom: 22px; ${isTarget ? 'border-left: 4px solid var(--primary); padding-left: 10px;' : ''}"><div style="color: var(--text-main); font-weight: 900; font-size: 1rem; margin-bottom: 4px; opacity: 0.7;">${v.verse}.</div><div style="line-height: 1.8; font-size: 1.35rem; color: var(--text-main);"><span style="${highlight}">${v.text}</span></div></div>`;
        });
        html += `</div><div style="height: 150px;"></div></div>`;
        document.getElementById("app-list").innerHTML = html;
        setTimeout(() => {
            const el = document.getElementById(`v-${verseNumber}`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 300);
        document.querySelector('.search-wrapper').style.display = 'none';
        document.getElementById('tabbar').classList.add('hidden');
    } catch (e) { renderList(currentType); }
}

function showListView() {
    const titleHeader = document.getElementById('header-title');
    if (currentType === 'bible' && viewState === 'verses') { openBibleChapters(currentBibleBook); return; }
    viewState = 'list';
    updateHeaderUI(false);
    const titles = { 'hymns': 'Longoi','bible': 'Alkitab', 'psalms': 'Zabur', 'prayers': 'Doa', 'liturgies': 'Hoturan', 'others': 'Vokon' };
    if (titleHeader) titleHeader.innerText = titles[currentType] || "More";
    document.querySelector('.search-wrapper').style.display = 'flex';
    document.getElementById('tabbar').classList.remove('hidden');
    renderList(currentType);
}

function expandSearch() {
    const container = document.getElementById('search-container');
    const input = document.getElementById('search-input');
    if (container) {
        container.classList.add('expanded');
        setTimeout(() => { if (input) input.focus(); }, 150);
    }
}

function shrinkSearch() {
    const container = document.getElementById('search-container');
    if (container) container.classList.remove('expanded');
}

document.addEventListener('click', function(event) {
    const container = document.getElementById('search-container');
    const searchBtn = document.querySelector('.search-btn');
    if (container) {
        if (!container.contains(event.target) && (!searchBtn || !searchBtn.contains(event.target))) {
            container.classList.remove('expanded');
        }
    }
});

loadData();
</script>
</body>
</html>
