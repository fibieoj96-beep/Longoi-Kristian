   <script>
    let allItems = [];
    let currentType = 'hymns';

    function toggleDarkMode() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

    async function loadData() {
        const categories = ["hymns", "psalms", "prayers", "liturgies", "others"];
        const fetchPromises = categories.map(async (cat) => {
            try {
                const res = await fetch(`data/${cat}.json`);
                if (!res.ok) return [];
                const data = await res.json();
                return data.map((item, index) => ({ ...item, type: cat, id: item.id || index + 1 }));
            } catch(e) { return []; }
        });
        const results = await Promise.all(fetchPromises);
        allItems = results.flat();
        renderList('hymns');
    }

    function renderList(type, filteredItems = null) {
        const items = filteredItems || allItems.filter(i => i.type === type);
        const listContainer = document.getElementById("app-list");
        
        if (items.length === 0) {
            listContainer.innerHTML = '<p style="text-align:center; padding:40px; color:var(--text-dim);">No items found.</p>';
            return;
        }

        listContainer.innerHTML = items.map((item, index) => {
            const displayId = item.id || (index + 1);
            // Updated number styling for visibility
            const numberPrefix = `<span style="color: var(--text-dim); font-weight: 800; margin-right: 10px;">${displayId}.</span>`;

            return `
                <div class="card" onclick="openDetail('${item.id}', '${item.type}')">
                    <div class="title">${numberPrefix}${item.title}</div>
                </div>
            `;
        }).join("");
    }

    function handleSearch() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const filtered = allItems.filter(i => i.type === currentType && i.title.toLowerCase().includes(query));
        renderList(currentType, filtered);
    }

    const searchContainer = document.getElementById('search-container');
    const searchInput = document.getElementById('search-input');

    function expandSearch() {
    const container = document.getElementById('search-container');
    const input = document.getElementById('search-input');
    
    if (container && !container.classList.contains('expanded')) {
        container.classList.add('expanded');
        setTimeout(() => input.focus(), 150); // Auto-focus for the keyboard
    }
}

function shrinkSearch() {
    const container = document.getElementById('search-container');
    const input = document.getElementById('search-input');
    if (input && input.value === "" && container) {
        container.classList.remove('expanded');
    }
}

window.addEventListener('scroll', () => {
    const container = document.getElementById('search-container');
    const input = document.getElementById('search-input');
    
    if (window.scrollY > 20) {
        if (container) container.classList.remove('expanded');
        if (input) input.blur();
    }
});

    function changeCategory(type, el) {
        currentType = type;
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        if (el) el.classList.add('active');
        const titles = { 'hymns': 'Longoi', 'psalms': 'Zabur', 'prayers': 'Doa', 'liturgies': 'Hoturan', 'others': 'Vokon' };
        document.getElementById('header-title').innerText = titles[type] || "More";
        showListView();
        renderList(type);
    }

    function openDetail(id, type) {
    const item = allItems.find(i => String(i.id) === String(id) && i.type === type);
    if (!item) return;

    const header = document.querySelector('header');
    header.classList.add('is-detail');
    
    document.querySelector('.search-wrapper').style.display = 'none';
    document.getElementById('back-button').style.display = 'flex';
    document.getElementById('tabbar').classList.add('hidden');

    let displayContent = "";

    // New Logic: Check for the nested structure in liturgies.json
    if (item.content_json && item.content_json.section) {
        displayContent = item.content_json.section.map(sec => {
            // Map through the 'content' array inside each section
            const sectionBody = sec.content ? sec.content.map(c => `
                <div style="margin-bottom: 20px;">
                    <h3 style="color: var(--primary); font-size: 1.1rem; margin-bottom: 5px; font-weight: bold;">${c.header}</h3>
                    <div class="verse-text">${c.paragraph || ""}</div>
                </div>
            `).join("") : "";
            return sectionBody;
        }).join("");
    } else {
        // Fallback for standard Hymns, Psalms, and Prayers
        const clean = (str) => str ? str.split('\\n').join('<br>') : "";
        displayContent = `<div class="verse-text">${clean(item.lyric || item.content)}</div>`;
    }

    document.getElementById("app-list").innerHTML = `
        <div class="lyrics-view">
            <h2 style="text-align:center; margin-bottom:20px;">${item.title}</h2>
            ${displayContent}
        </div>`;
    window.scrollTo(0,0);
}

    function showListView() {
        const header = document.querySelector('header');
        header.classList.remove('is-detail'); // Moves title back to left
        
        document.querySelector('.search-wrapper').style.display = 'flex';
        document.getElementById('back-button').style.display = 'none';
        document.getElementById('tabbar').classList.remove('hidden');
        renderList(currentType);
    }

    loadData();
</script>
</body>
