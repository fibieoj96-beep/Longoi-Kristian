<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Longoi Kristian</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Longoi">
    <link rel="apple-touch-icon" href="asset/icon/icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body onscroll="handleAutoShrink()">

<header class="textured-header" id="main-header">
    <div class="header-slot-left">
        <button id="back-button" class="back-pill" onclick="showListView()" style="display: none;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            <span>BACK</span>
        </button>
    </div>
    <h1 id="header-title">Longoi</h1>
    <div class="header-slot-right">
        <div onclick="toggleDarkMode()" class="icon-toggle" id="dark-toggle">
            <svg class="sun-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg class="moon-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </div>
    </div>
</header>

<main id="main-content">
    <div class="search-wrapper" id="search-area">
        <div class="search-box" id="search-container" onclick="expandSearch()">
            <input type="text" id="search-input" placeholder="Search..." onkeyup="handleSearch()">
            <div class="search-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
        </div>
    </div>
    <div id="app-list">
        <p style="text-align: center; padding: 40px; color: var(--text-dim);">Loading...</p>
    </div>
</main>

<nav class="tabbar" id="tabbar">
    <div class="nav-indicator"></div>
    <button class="nav-item active" onclick="changeCategory('hymns', this)">
        <img src="asset/icon/longoi-active.png" class="icon-active">
        <img src="asset/icon/longoi-dim.png" class="icon-dim">
        <span class="nav-label">Longoi</span>
    </button>
    <button class="nav-item" onclick="changeCategory('psalms', this)">
        <img src="asset/icon/zabur-active.png" class="icon-active">
        <img src="asset/icon/zabur-dim.png" class="icon-dim">
        <span class="nav-label">Zabur</span>
    </button>
    <button class="nav-item" onclick="changeCategory('bible', this)">
        <img src="asset/icon/alkitab-active.png" class="icon-active">
        <img src="asset/icon/alkitab-dim.png" class="icon-dim">
        <span class="nav-label">Alkitab</span>
    </button>
    <button class="nav-item" onclick="changeCategory('prayers', this)">
        <img src="asset/icon/doa-active.png" class="icon-active">
        <img src="asset/icon/doa-dim.png" class="icon-dim">
        <span class="nav-label">Doa</span>
    </button>
    <button class="nav-item" onclick="changeCategory('liturgies', this)">
        <img src="asset/icon/hoturan-active.png" class="icon-active">
        <img src="asset/icon/hoturan-dim.png" class="icon-dim">
        <span class="nav-label">Hoturan</span>
    </button>
    <button class="nav-item" onclick="changeCategory('others', this)">
        <img src="asset/icon/more-active.png" class="icon-active">
        <img src="asset/icon/more-dim.png" class="icon-dim">
        <span class="nav-label">Vokon</span>
    </button>
</nav>

<div class="tabbar-watermark">© 2026 Hak Cipta Terpelihara. Fibieo.J96</div>

<script>
let allItems = [];
let currentType = 'hymns';
let viewState = 'list';

function toggleDarkMode() {
    const isDark = document.body.classList.toggle('dark-mode');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}
if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

// Autoshrink apabila skrol
function handleAutoShrink() {
    const container = document.getElementById('search-container');
    const input = document.getElementById('search-input');
    if (window.scrollY > 20 && container.classList.contains('expanded')) {
        container.classList.remove('expanded');
        input.blur();
    }
}

document.addEventListener('click', function(event) {
    const container = document.getElementById('search-container');
    const input = document.getElementById('search-input');
    if (container && container.classList.contains('expanded')) {
        if (!container.contains(event.target)) {
            container.classList.remove('expanded');
            input.blur();
        }
    }
});

async function loadData() {
    const categories = ["hymns", "bible", "psalms", "prayers", "liturgies", "others"];
    const fetchPromises = categories.map(async (cat) => {
        try {
            const res = await fetch(`data/${cat}.json?v=${new Date().getTime()}`);
            if (!res.ok) return [];
            const data = await res.json();
            return data.map((item, index) => {
                const finalTitle = item.title || item.name || item.judul || "No Title";
                let searchTag = finalTitle.toLowerCase() + " ";
                let displayContent = "";

                if (cat === 'liturgies' && item.content_json) {
                    item.content_json.section.forEach(sec => {
                        searchTag += (sec.section_title || "").toLowerCase() + " ";
                        sec.content.forEach(c => {
                            searchTag += (c.header || "").toLowerCase() + " " + (c.paragraph || "").toLowerCase() + " ";
                        });
                    });
                    displayContent = "LITURGI_CONTENT"; 
                } else {
                    const raw = item.content || item.text || item.lyric || "";
                    searchTag += raw.toLowerCase();
                    displayContent = raw;
                }

                return { ...item, type: cat, id: item.id || (index + 1), title: finalTitle, content: displayContent, searchTag: searchTag };
            });
        } catch(e) { return []; }
    });
    const results = await Promise.all(fetchPromises);
    allItems = results.flat();
    renderList(currentType);
}

function expandSearch() {
    const container = document.getElementById('search-container');
    const input = document.getElementById('search-input');
    if (container) {
        container.classList.add('expanded');
        setTimeout(() => { if (input) input.focus(); }, 150);
    }
}

async function handleSearch() {
    const query = document.getElementById('search-input').value.toLowerCase().trim();
    const titleHeader = document.getElementById('header-title');
    
    if (query === "") {
        const titles = { 'hymns': 'Longoi','bible': 'Alkitab', 'psalms': 'Zabur', 'prayers': 'Doa', 'liturgies': 'Hoturan', 'others': 'Vokon' };
        titleHeader.innerText = titles[currentType] || "More";
        renderList(currentType);
        return;
    }

    if (currentType === 'bible') {
        const bibleJumpMatch = query.match(/^([1-3]?\s*[a-z]+)?\s*(\d+):(\d+)$/);
        if (bibleJumpMatch) {
            const bookSearch = (bibleJumpMatch[1] || "").trim();
            const chapterNum = parseInt(bibleJumpMatch[2]);
            const verseNum = bibleJumpMatch[3];
            const bibleBooks = allItems.filter(i => i.type === 'bible' && i.title.toLowerCase().includes(bookSearch));
            if (bibleBooks.length > 0) {
                const book = bibleBooks[0];
                renderBibleSpecificAuto(book.id, chapterNum - 1, verseNum);
                document.getElementById('search-input').value = "";
                document.getElementById('search-container').classList.remove('expanded');
                return;
            }
        }

        const bibleListMatch = query.match(/^([1-3]?\s*[a-z]+)?\s*(\d+)$/);
        if (bibleListMatch) {
            const bookSearch = (bibleListMatch[1] || "").trim();
            const chapterNum = parseInt(bibleListMatch[2]);
            const bibleBooks = allItems.filter(i => i.type === 'bible' && i.title.toLowerCase().includes(bookSearch));
            
            if (bibleBooks.length > 0) {
                const book = bibleBooks[0];
                titleHeader.innerText = "Results";
                renderBibleSearchList(book.id, chapterNum);
                return;
            }
        }
    }

    const filtered = allItems.filter(item => {
        if (item.type !== currentType) return false;
        if (/^\d+$/.test(query)) {
            return item.title.toLowerCase().startsWith(query + ".") || 
                   item.title.toLowerCase().startsWith(query + " ") ||
                   item.searchTag.includes(" " + query + " ");
        }
        return item.searchTag.includes(query);
    });

    titleHeader.innerText = "Results";
    renderList(null, filtered);
}

async function renderBibleSearchList(bookId, chapterNum) {
    try {
        const res = await fetch(`data/bible/${bookId}.json?v=${new Date().getTime()}`);
        const data = await res.json();
        const ch = data.find(c => String(c.chapter).includes(String(chapterNum)));
        
        if (ch) {
            const listContainer = document.getElementById("app-list");
            listContainer.innerHTML = ch.content.map(v => `
                <div class="card" onclick="renderBibleSpecificAuto('${bookId}', ${data.indexOf(ch)}, '${v.verse}')">
                    <div class="title" style="text-align:left;">
                        <span style="opacity:0.5; font-size:0.8rem;">${bookId} ${chapterNum}:${v.verse}</span><br>
                        ${v.text.substring(0, 65)}...
                    </div>
                </div>
            `).join("");
        } else {
            document.getElementById("app-list").innerHTML = '<div style="text-align:center;padding:50px;opacity:0.5;">Tiada Data</div>';
        }
    } catch (e) {
        console.error(e);
    }
}

function changeCategory(type, el) {
    currentType = type;
    viewState = 'list';
    const navItems = document.querySelectorAll('.nav-item');
    const index = Array.from(navItems).indexOf(el);
    document.documentElement.style.setProperty('--nav-index', index);
    navItems.forEach(item => item.classList.remove('active'));
    if (el) el.classList.add('active');
    
    document.getElementById('search-input').value = ""; 
    document.getElementById('search-container').classList.remove('expanded');
    
    const titles = { 'hymns': 'Longoi','bible': 'Alkitab', 'psalms': 'Zabur', 'prayers': 'Doa', 'liturgies': 'Hoturan', 'others': 'Vokon' };
    document.getElementById('header-title').innerText = titles[type] || "More";
    
    showListView();
}

async function renderBibleVersesAuto(bookId, chapterIndex) {
 
document.querySelector('.tabbar-watermark').style.setProperty('background', 'var(--bg)', 'important');
   
document.getElementById('search-area').style.display = 'none';
    document.getElementById('tabbar').classList.add('hidden');
    
    const searchInput = document.getElementById('search-input');
    const searchContainer = document.getElementById('search-container');
    if (searchInput) searchInput.value = "";
    if (searchContainer) searchContainer.classList.remove('expanded');

    try {
        const res = await fetch(`data/bible/${bookId}.json?v=${new Date().getTime()}`);
        const data = await res.json();
        const ch = data[chapterIndex];
        if (!ch) return;
        
        const cleanNum = String(ch.chapter).replace(/Bab/gi, "").trim();
        
        let html = `
            <div class="bible-reader-view" style="padding:20px 15px; text-align:left;">
                <div style="text-align:center; margin-bottom: 25px;">
                    <div style="font-weight:900; font-size:1.8rem; text-transform:uppercase; color:var(--text-main);">${bookId}</div>
                    <div style="color:var(--text-main); opacity:0.6; font-weight:700; margin-top:5px;">Bab ${cleanNum}</div>
                </div>
                <div class="verses-container">
                    ${ch.content.map(v => `
                        <div style="margin-bottom:22px;">
                            <span style="font-weight:900; font-size:1rem; margin-right:8px; opacity:0.7; color:var(--text-main);">${v.verse}</span>
                            <span style="line-height:1.8; font-size:1.35rem; color:var(--text-main);">${v.text}</span>
                        </div>`).join("")}
                </div>
                <div style="height:150px;"></div> 
            </div>`;
            
        document.getElementById("app-list").innerHTML = html;
        updateHeaderUI(true);
        window.scrollTo(0,0);
    } catch (e) {
        console.error(e);
    }
}

async function renderBibleSpecificAuto(bookId, chapterIndex, verseNumber) {

document.querySelector('.tabbar-watermark').style.setProperty('background', 'var(--bg)', 'important');
    
document.getElementById('search-area').style.display = 'none';
    document.getElementById('tabbar').classList.add('hidden');
    
    const searchInput = document.getElementById('search-input');
    const searchContainer = document.getElementById('search-container');
    if (searchInput) searchInput.value = "";
    if (searchContainer) searchContainer.classList.remove('expanded');

    viewState = 'verses';
    updateHeaderUI(true);
    document.getElementById('header-title').innerText = "Alkitab";

    try {
        const res = await fetch(`data/bible/${bookId}.json?v=${new Date().getTime()}`);
        const data = await res.json();
        const ch = data[chapterIndex];
        if (!ch) return;
        
        const cleanNum = String(ch.chapter).replace(/Bab/gi, "").trim();
        
        let html = `
            <div class="bible-reader-view" style="padding:20px 15px; text-align:left;">
                <div style="text-align:center; margin-bottom: 25px;">
                    <div style="font-weight:900; font-size:1.8rem; text-transform:uppercase; color:var(--text-main);">${bookId}</div>
                    <div style="color:var(--text-main); opacity:0.6; font-weight:700; margin-top:5px;">Bab ${cleanNum}</div>
                </div>
                <div class="verses-container">`;
        
        html += ch.content.map(v => {
            const isTarget = String(v.verse) === String(verseNumber);
            const style = isTarget ? `style="background:rgba(255,255,255,0.08); border-radius:12px; padding:15px; margin:10px -5px; border:1px solid rgba(255,255,255,0.15);"` : `style="margin-bottom:22px;"`;
            return `<div id="v-${v.verse}" ${style}><span style="font-weight:900; font-size:1rem; margin-right:8px; opacity:0.7; color:var(--text-main);">${v.verse}</span><span style="line-height:1.8; font-size:1.35rem; color:var(--text-main);">${v.text}</span></div>`;
        }).join("");

        html += `</div><div style="height:150px;"></div></div>`;
        
        document.getElementById("app-list").innerHTML = html;
        
        setTimeout(() => {
            const el = document.getElementById(`v-${verseNumber}`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 200);
    } catch(e) {
        console.error(e);
    }
}
function updateHeaderUI(isCenter) {
    const titleHeader = document.getElementById('header-title');
    const darkToggle = document.getElementById('dark-toggle');
    const header = document.getElementById('main-header');
    const backBtn = document.getElementById('back-button');
    if (header) header.style.minHeight = isCenter ? '90px' : '70px';
    if (titleHeader) {
        titleHeader.style.position = isCenter ? 'absolute' : 'static';
        titleHeader.style.left = isCenter ? '50%' : 'auto';
        titleHeader.style.transform = isCenter ? 'translateX(-50%)' : 'none';
    }
    if (darkToggle) darkToggle.style.display = isCenter ? 'none' : 'flex';
    if (backBtn) backBtn.style.display = isCenter ? 'flex' : 'none';
}

function renderList(type, filteredItems = null) {
    const listContainer = document.getElementById("app-list");
    updateHeaderUI(false);
    const items = filteredItems || allItems.filter(i => i.type === type);
    if (items.length === 0) { listContainer.innerHTML = '<div style="text-align:center;padding:50px;opacity:0.5;">Tiada Data</div>'; return; }
    listContainer.innerHTML = items.map((item) => `<div class="card" onclick="openDetail('${item.id}', '${item.type}')"><div class="title" style="text-align:left;">${item.title}</div></div>`).join("");
}

function openDetail(id, type) {
    if (type === 'bible') { 
        openBibleChapters(id); 
        return; 
    }
    viewState = 'detail';
    const item = allItems.find(i => String(i.id) === String(id) && i.type === type);
    if (!item) return;
    
    const titles = { 
        'hymns': 'Longoi', 
        'psalms': 'Zabur', 
        'prayers': 'Doa', 
        'liturgies': 'Hoturan', 
        'others': 'Vokon' 
    };
    document.getElementById('header-title').innerText = titles[type] || "Detail";

    const watermark = document.querySelector('.tabbar-watermark');
    if (watermark) {
        watermark.style.setProperty('background', 'var(--bg)', 'important');
    }

    const searchInput = document.getElementById('search-input');
    const searchContainer = document.getElementById('search-container');
    if (searchInput) searchInput.value = "";
    if (searchContainer) searchContainer.classList.remove('expanded');

    updateHeaderUI(true);
    document.getElementById('search-area').style.display = 'none';
    document.getElementById('tabbar').classList.add('hidden');
    
   let contentHtml = "";
if (type === 'liturgies') {
    fetch(`data/liturgies.json?v=${new Date().getTime()}`).then(r => r.json()).then(data => {
        const entry = data.find(e => String(e.id) === String(id));
        let finalHtml = "";
        entry.content_json.section.forEach(sec => {
            if (sec.section_title) {
                finalHtml += `<h3 style="margin-top:30px; color:var(--text-main); text-transform:uppercase; text-align:left; opacity:0.8; white-space:normal !important; overflow:visible !important;">${sec.section_title}</h3>`;
            }
            sec.content.forEach(c => {
                if (c.header) {
                    finalHtml += `<div style="font-weight:900; margin-top:20px; color:var(--text-main); font-size:1.1rem; text-align:left; white-space:normal !important; overflow:visible !important; text-overflow:clip !important; display:block !important;">${c.header}</div>`;
                }
                if (c.paragraph) {
                    finalHtml += `<div style="margin-bottom:15px; line-height:1.7; opacity:0.9; text-align:left; color:var(--text-main); white-space:normal !important; display:block !important;">${c.paragraph}</div>`;
                }
            });
        });
        document.getElementById('liturgy-render').innerHTML = finalHtml;
    });
    contentHtml = `<div id="liturgy-render">Loading...</div>`;
} else {
    contentHtml = `<div class="clean-render-left" style="text-align:left; color:var(--text-main); white-space:pre-wrap;">${item.content}</div>`;
}

const cleanTitle = item.title.replace(/^\d+\.\s*/, "");
document.getElementById("app-list").innerHTML = `
    <div class="lyrics-view" style="padding: 25px 20px 180px 20px; text-align:left;">
        <h2 style="text-align:center !important; margin-bottom:45px; font-weight:900; font-size:1.4rem; line-height:1.3; color:var(--text-main); white-space:normal !important; overflow:visible !important;">${cleanTitle}</h2>
        ${contentHtml}
    </div>`;
window.scrollTo(0,0);
}

async function openBibleChapters(bookId) {
    currentBibleBook = bookId;
    viewState = 'chapters';
    updateHeaderUI(true);
    document.getElementById('header-title').innerText = "Alkitab";
    document.getElementById('search-area').style.display = 'flex';
    document.getElementById('tabbar').classList.remove('hidden');
    
    try {
        const res = await fetch(`data/bible/${bookId}.json`);
        const data = await res.json();
        
        let html = `
            <div class="bible-view" style="padding:20px; padding-bottom:180px; min-height:100vh; box-sizing:border-box;">
                <h2 style="text-align:center; margin-bottom:30px; font-weight:900; text-transform:uppercase; color:var(--text-main);">${bookId}</h2>
                <div class="chapter-grid" style="display:grid; grid-template-columns:repeat(5,1fr); gap:10px;">`;
        
        data.forEach((ch, index) => {
            const cleanNum = String(ch.chapter).replace(/Bab/gi, "").trim();
            html += `
                <div class="chapter-card" onclick="renderBibleVersesAuto('${bookId}', ${index})" style="background:var(--surface); aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; border-radius:12px; border:1px solid var(--border); cursor:pointer;">
                    <div style="font-weight:900; color:var(--text-main); font-size:1.1rem;">${cleanNum}</div>
                </div>`;
        });
        
        html += `</div></div>`;
        document.getElementById("app-list").innerHTML = html;
        window.scrollTo(0,0);
    } catch(e) {
        console.error(e);
    }
}

function showListView() {
    viewState = 'list';
    updateHeaderUI(false);

    const watermark = document.querySelector('.tabbar-watermark');
    if (watermark) {
        watermark.style.setProperty('background', 'var(--surface)', 'important');
    }
    
    document.getElementById('search-area').style.display = 'flex';
    document.getElementById('tabbar').classList.remove('hidden');
    
    const titles = { 
        'hymns': 'Longoi',
        'bible': 'Alkitab', 
        'psalms': 'Zabur', 
        'prayers': 'Doa', 
        'liturgies': 'Hoturan', 
        'others': 'Vokon' 
    };
    document.getElementById('header-title').innerText = titles[currentType] || "More";
    renderList(currentType);
}

document.addEventListener('DOMContentLoaded', () => { 
    loadData(); 
    const watermark = document.querySelector('.tabbar-watermark');
    if (watermark) {
        watermark.style.setProperty('background', 'var(--surface)', 'important');
    }
});
</script>
</body>
</html>
